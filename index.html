<!DOCTYPE html>
<html>
<head>
<title>LinguaPro Hub</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #74ebd5, #9face6);
    text-align: center;
}
.card {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
}
input, textarea {
    width: 80%;
    padding: 10px;
    margin: 10px;
}
button {
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
}
</style>

</head>
<body>

<h1>🚀 LinguaPro Hub</h1>

<!-- 🌍 Translator -->
<div class="card">
<h2>🌍 Translator</h2>

<input type="text" id="text" placeholder="Enter text">
<select id="lang">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
</select>

<br>
<button onclick="translate()">Translate</button>
<p id="result"></p>
</div>

<!-- 📚 Story System -->
<div class="card">
<h2>📚 Add Story</h2>

<textarea id="storyInput"></textarea>
<br>
<button onclick="addStory()">Save Story</button>
</div>

<div class="card">
<h2>📖 Saved Stories</h2>
<ul id="storyList"></ul>
</div>

<!-- 🎧 Audio -->
<div class="card">
<h2>🎧 Listen</h2>

<textarea id="audioText"></textarea><br>
<button onclick="speak()">Play</button>
</div>

<script>

// 🌍 Translator
function translate() {
    let text = document.getElementById("text").value;
    let lang = document.getElementById("lang").value;

    fetch(`https://api.mymemory.translated.net/get?q=${text}&langpair=auto|${lang}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
        data.responseData.translatedText;
    });
}

// 💾 Local Storage Story System
let stories = JSON.parse(localStorage.getItem("stories")) || [];

function addStory() {
    let story = document.getElementById("storyInput").value;
    if(story.trim() !== "") {
        stories.push(story);
        localStorage.setItem("stories", JSON.stringify(stories));
        showStories();
    }
}

function showStories() {
    let list = document.getElementById("storyList");
    list.innerHTML = "";

    stories.forEach((s, i) => {
        let li = document.createElement("li");
        li.innerHTML = s + 
        `<br><button onclick="playStory(${i})">🎧 Play</button>`;
        list.appendChild(li);
    });
}

function playStory(i) {
    let speech = new SpeechSynthesisUtterance(stories[i]);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}

// 🎧 Audio
function speak() {
    let text = document.getElementById("audioText").value;
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}

// Load saved stories
showStories();

</script>

</body>
</html>
