<!DOCTYPE html>
<html>
<head>
<title>EduLingua Hub</title>

<style>
body {
    font-family: Arial;
    background: #eef2f3;
    text-align: center;
}
.card {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
}
button {
    padding: 10px;
    background: blue;
    color: white;
    border: none;
}
</style>

</head>
<body>

<h1>📚 EduLingua Hub</h1>

<!-- 🌍 Translator -->
<div class="card">
<h2>🌍 Language Translator</h2>
<input type="text" id="text" placeholder="Enter text"><br><br>

<select id="lang">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
</select><br><br>

<button onclick="translate()">Translate</button>
<p id="result"></p>
</div>

<!-- 📚 NCERT Links -->
<div class="card">
<h2>📚 NCERT Books (Class 6–12)</h2>

<ul>
<li><a href="https://ncert.nic.in/textbook.php" target="_blank">Open All NCERT Books</a></li>
<li><a href="https://epathshala.nic.in/" target="_blank">ePathshala</a></li>
</ul>

</div>

<!-- 🎧 Songs -->
<div class="card">
<h2>🎧 Songs Player</h2>

<input type="text" id="yt" placeholder="Paste YouTube link"><br><br>
<button onclick="playSong()">Play</button>

<br><br>

<iframe id="player" width="300" height="200"></iframe>

</div>

<script>

// 🌍 Translator
function translate() {
    let text = document.getElementById("text").value;
    let lang = document.getElementById("lang").value;

    fetch(`https://api.mymemory.translated.net/get?q=${text}&langpair=auto|${lang}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
        data.responseData.translatedText;
    });
}

// 🎧 YouTube Player
function playSong() {
    let link = document.getElementById("yt").value;
    let videoId = link.split("v=")[1];
    document.getElementById("player").src =
    "https://www.youtube.com/embed/" + videoId;
}

</script>

</body>
</html>
