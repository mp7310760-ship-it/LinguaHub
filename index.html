<!DOCTYPE html>
<html>
<head>
<title>LinguaBook Hub</title>

<style>
body {
    font-family: Arial;
    background: #eef2f3;
    text-align: center;
}

h1 {
    color: #333;
}

.container {
    width: 90%;
    margin: auto;
}

textarea, input, select {
    width: 80%;
    padding: 10px;
    margin: 10px;
}

button {
    padding: 10px 20px;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
}
</style>

</head>
<body>

<h1>🌐 LinguaBook Hub</h1>

<div class="container">

<!-- 🌍 Translator -->
<div class="card">
<h2>🌍 Language Translator</h2>

<input type="text" id="text" placeholder="Enter text">

<select id="lang">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
</select>

<br>
<button onclick="translate()">Translate</button>

<p id="result"></p>
</div>

<!-- 📚 Preloaded Books -->
<div class="card">
<h2>📚 Stories Library</h2>

<ul id="bookList"></ul>
</div>

<!-- ➕ Add Story -->
<div class="card">
<h2>➕ Add Your Story</h2>

<textarea id="newStory" placeholder="Write your story..."></textarea>
<br>
<button onclick="addStory()">Add Story</button>
</div>

<!-- 🎧 Audio -->
<div class="card">
<h2>🎧 Listen Story</h2>

<textarea id="storyText" placeholder="Paste story here..."></textarea>
<br>
<button onclick="speak()">Play Audio</button>
</div>

</div>

<script>

// 🌍 Translator
function translate() {
    let text = document.getElementById("text").value;
    let lang = document.getElementById("lang").value;

    fetch(`https://api.mymemory.translated.net/get?q=${text}&langpair=auto|${lang}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
        data.responseData.translatedText;
    });
}

// 📚 Preloaded Stories
let stories = [
"Once upon a time, a lion lived in a forest.",
"A boy had a magical pencil that could draw real things.",
"एक बार एक किसान था जो बहुत मेहनती था।",
"A clever fox tricked a crow to get food.",
"There was a brave girl who saved her village."
];

// Show stories
function showStories() {
    let list = document.getElementById("bookList");
    list.innerHTML = "";

    stories.forEach((story, index) => {
        let li = document.createElement("li");
        li.innerHTML = story + 
        `<br><button onclick="playStory(${index})">🎧 Play</button>`;
        list.appendChild(li);
    });
}

// Add new story
function addStory() {
    let newStory = document.getElementById("newStory").value;
    if(newStory.trim() !== "") {
        stories.push(newStory);
        showStories();
    }
}

// 🎧 Audio play
function speak() {
    let text = document.getElementById("storyText").value;
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}

// Play from list
function playStory(index) {
    let speech = new SpeechSynthesisUtterance(stories[index]);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}

// Load stories
showStories();

</script>

</body>
</html>
